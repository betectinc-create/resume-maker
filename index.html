const handlePhoto=e=>{const file=e.target.files?.[0];if(file){const img=new Image();img.onload=function(){const canvas=document.createElement("canvas");canvas.width=227;canvas.height=303;const ctx=canvas.getContext("2d");const sx=Math.max(0,(img.width-img.height*0.75)/2);const sy=Math.max(0,(img.height-img.width/0.75)/2);const sw=Math.min(img.width,img.height*0.75);const sh=Math.min(img.height,img.width/0.75);ctx.drawImage(img,sx,sy,sw,sh,0,0,227,303);setF(p=>({...p,photoPreview:canvas.toDataURL("image/jpeg",0.9)}));};img.src=URL.createObjectURL(file);}};

const pS=id=>setF(p=>({...p,strId:id,scene:"",sceneOther:"",selfPR:gP(id,"",""),motivation:gM(id)}));
const pSc=sc=>{setF(p=>({...p,scene:sc,selfPR:gP(f.strId,sc,f.sceneOther)}));};
useEffect(()=>{if(f.strId&&f.scene)setF(p=>({...p,selfPR:gP(f.strId,f.scene,f.sceneOther)}));},[f.sceneOther]);
const lookupZip=async()=>{const z=f.zip.replace(/[-ー−]/g,"").replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0));if(z.length<7){tt("7桁入力してください");return;}try{const r=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${z}`);const d=await r.json();if(d.results?.[0]){const a=d.results[0];setF(p=>({...p,address:`${a.address1}${a.address2}${a.address3}`}));tt("住所を入力しました");}else{tt("見つかりません");}}catch{tt("検索できません");}};

const dg=n=>{const v=f["grade"+n];return v==="その他（記入）"?f["grade"+n+"custom"]:(f["techo"+n]==="その他"?f["grade"+n+"custom"]:v);};

<div className={cc}><h3 className={hc} style={{color:O[700]}}>志望動機（編集可）</h3><textarea className={ic+" h-32"} value={f.motivation} onChange={e=>{if(e.target.value.length<=MP)setF(p=>({...p,motivation:e.target.value}));}} placeholder="強み選択で自動生成"/><div className="flex justify-between mt-1"><p className="text-xs" style={{color:f.motivation.length>=280&&f.motivation.length<=380?"#5B8C2B":"#E87830"}}>{f.motivation.length<280?"320文字くらいがベスト！":f.motivation.length<=380?"いい文字量です！":"少し長すぎるかも…"}</p><p className={`text-xs ${f.motivation.length>MP*0.9?"text-red-500":"text-gray-400"}`}>{f.motivation.length}/{MP}</p></div></div>
</div>;

/* ========== S5: REVIEW + DOCX DOWNLOAD ========== */

useEffect(function(){setZipReady(true);},[]);
const xesc=function(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");};
const rNth=function(str,old,rep,n){var idx=-1;for(var i=0;i<=n;i++){idx=str.indexOf(old,idx+1);if(idx===-1)return str;}return str.substring(0,idx)+rep+str.substring(idx+old.length);};
const insEP=function(xml,marker,n,text){text=xesc(text);var pos=xml.indexOf(marker);if(pos===-1)return xml;var emp="</w:pPr></w:p>";var search=pos;for(var i=0;i<=n;i++){var p=xml.indexOf(emp,search);if(p===-1)return xml;if(i<n){search=p+emp.length;}else{var rn='<w:r><w:rPr><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr><w:t>'+text+'</w:t></w:r>';return xml.substring(0,p+"</w:pPr>".length)+rn+xml.substring(p+"</w:pPr>".length);}}return xml;};
const insAfter=function(xml,marker,text){var pos=xml.indexOf(marker);if(pos===-1)return xml;var ep=xml.indexOf("</w:pPr></w:p>",pos);if(ep===-1)return xml;var rn='<w:r><w:rPr><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr><w:t>'+xesc(text)+'</w:t></w:r>';return xml.substring(0,ep+"</w:pPr>".length)+rn+xml.substring(ep+"</w:pPr>".length);};

const generateDocx=async function(){
  if(!window.JSZip){tt("テンプレート読み込み中...");return;}
  setGenerating(true);
  try{
    var bin=Uint8Array.from(atob(TMPL_B64),function(c){return c.charCodeAt(0);});
    var zp=await window.JSZip.loadAsync(bin);
    var xml=await zp.file("word/document.xml").async("string");
    var yr=String(now.getFullYear()),mo=String(now.getMonth()+1),dy=String(now.getDate());
    var ag=f.birthYear?String(now.getFullYear()-parseInt(f.birthYear)):"";
    xml=xml.replace("年　　月　　日",yr+"年　"+mo+"月　"+dy+"日");
    if(f.furigana)xml=rNth(xml,"ふりがな","ふりがな　"+xesc(f.furigana),0);
    if(f.name)xml=xml.replace("氏　　名</w:t></w:r>","氏　名</w:t></w:r><w:r><w:rPr><w:sz w:val=\"40\"/><w:szCs w:val=\"40\"/></w:rPr><w:t>　"+xesc(f.name)+"</w:t></w:r>");
    xml=xml.replace("年　　　　月　　　　日生　（満　　　歳）",f.birthYear+"年　"+f.birthMonth+"月　"+f.birthDay+"日生　（満"+ag+"歳）");
    
    if(f.gender==="男")xml=xml.replace("※　男・女","※　男");
    else if(f.gender==="女")xml=xml.replace("※　男・女","※　女");
    if(f.furiganaAddr)xml=rNth(xml,"ふりがな","ふりがな　"+xesc(f.furiganaAddr),1);
    if(f.phone)xml=rNth(xml,"電話","電話　"+xesc(f.phone),0);
    if(f.zip||f.address)xml=xml.replace("現住所　〒","現住所　〒"+xesc(f.zip)+"　"+xesc(f.address));
    xml=xml.replace("最寄り駅　　　線　　　駅　徒歩　　分","最寄り駅　"+xesc(f.nearLine)+"線　"+xesc(f.nearStation)+"駅　徒歩"+xesc(f.walkMin)+"分");
    if(f.mobile)xml=rNth(xml,"携帯","携帯　"+xesc(f.mobile),0);
    if(f.fax)xml=rNth(xml,"FAX","FAX　"+xesc(f.fax),0);
    if(f.furiganaContact)xml=rNth(xml,"ふりがな","ふりがな　"+xesc(f.furiganaContact),2);
    if(f.contactPhone)xml=rNth(xml,"電話","電話　"+xesc(f.contactPhone),1);
    if(f.contactZip||f.contactAddr)xml=xml.replace("連絡先　〒","連絡先　〒"+xesc(f.contactZip)+"　"+xesc(f.contactAddr));
    if(f.contactMobile)xml=rNth(xml,"携帯","携帯　"+xesc(f.contactMobile),1);
    if(f.contactFax)xml=rNth(xml,"FAX","FAX　"+xesc(f.contactFax),1);
    xml=xml.replace("E-mail：　","E-mail："+xesc(f.email));
    var eR2=f.education.filter(function(e){return e.name;}).map(function(e){return {y:e.year,m:e.month,t:eduF(e)};});
    var wR2=f.work.filter(function(w){return w.company;}).map(function(w){return {y:w.year,m:w.month,t:w.company+" "+w.sfx};});
    var hist=[];
    if(eR2.length){eR2.forEach(function(r){hist.push(r);});}
    if(wR2.length){wR2.forEach(function(r){hist.push(r);});}
    var hM="学歴・職歴（各部にまとめて書く）";
    for(var i=Math.min(hist.length,16)-1;i>=0;i--){if(hist[i].t)xml=insEP(xml,hM,i*3+2,hist[i].t);if(hist[i].m)xml=insEP(xml,hM,i*3+1,hist[i].m);if(hist[i].y)xml=insEP(xml,hM,i*3,hist[i].y);}
    var qM="免許・資格";
    var qs=f.quals.filter(function(q){return q.name;});
    for(var j=Math.min(qs.length,5)-1;j>=0;j--){var nm=qs[j].name==="その他（自由記入）"?qs[j].custom:qs[j].name;if(nm)xml=insEP(xml,qM,j*3+2,nm);if(qs[j].month)xml=insEP(xml,qM,j*3+1,qs[j].month);if(qs[j].year)xml=insEP(xml,qM,j*3,qs[j].year);}
    if(f.selfPR){var prPos2=xml.indexOf("PR</w:t>");if(prPos2!==-1){var ep=xml.indexOf("</w:pPr></w:p>",prPos2);if(ep!==-1){var prRun='<w:r><w:rPr><w:sz w:val="16"/><w:szCs w:val="16"/></w:rPr><w:t>'+xesc(f.selfPR)+'</w:t></w:r>';xml=xml.substring(0,ep+"</w:pPr>".length)+prRun+xml.substring(ep+"</w:pPr>".length);}}}
    var d1=f.dis1name==="その他"?f.dis1other:f.dis1name;
    var d2=f.dis2name==="その他"?f.dis2other:f.dis2name;
    var d3=f.dis3name==="その他"?f.dis3other:f.dis3name;
    var d4=f.dis4name==="その他"?f.dis4other:f.dis4name;
    if(d1)xml=insAfter(xml,"障がい①</w:t>",d1);
    if(d2)xml=insAfter(xml,"障がい②</w:t>",d2);
    if(d3)xml=insAfter(xml,"障がい③</w:t>",d3);
    if(d4)xml=insAfter(xml,"障がい④</w:t>",d4);
    var tc1=f.techo1||"";var g1v=dg(1);if(tc1&&g1v)tc1=tc1+" "+g1v;else if(g1v)tc1=g1v;
    var tc2=f.techo2||"";var g2v=dg(2);if(tc2&&g2v)tc2=tc2+" "+g2v;else if(g2v)tc2=g2v;
    var tc3=f.techo3||"";var g3v=dg(3);if(tc3&&g3v)tc3=tc3+" "+g3v;else if(g3v)tc3=g3v;
    if(tc1)xml=insAfter(xml,"手帳①</w:t>",tc1);
    if(tc2)xml=insAfter(xml,"手帳②</w:t>",tc2);
    if(tc3)xml=insAfter(xml,"手帳③</w:t>",tc3);
    var vt=f.visit+(f.visit==="している"&&f.visitFreq?("（"+(f.visitFreq==="その他"?f.visitFreqOther:f.visitFreq)+"）"):"");
    if(vt)xml=insAfter(xml,"通院</w:t>",vt);
    var mt=f.med+(f.med==="している"&&f.medName?("（"+f.medName+"）"):"");
    if(mt)xml=insAfter(xml,"服薬</w:t>",mt);
    if(f.chars)xml=insAfter(xml,"現状</w:t>",f.chars);
    if(f.accoms)xml=insAfter(xml,"配慮</w:t>",f.accoms);
    xml=xml.replace("約　　　　時間　　　　分","約　"+f.commuteH+"　時間　"+f.commuteM+"　分");
    xml=rNth(xml,"人　　　　",f.familyCount+"人",0);
    if(f.spouse==="有")xml=xml.replace("※　有・無　","※　有　");
    else if(f.spouse==="無")xml=xml.replace("※　有・無　","※　無　");
    if(f.dependent==="有")xml=xml.replace("※　　　有・無","※　　　有");
    else if(f.dependent==="無")xml=xml.replace("※　　　有・無","※　　　無");

    if(f.photoPreview){
      try{
        var pdata=f.photoPreview.split(",")[1];
        var pmime=f.photoPreview.match(/data:([^;]+)/)[1];
        var pext=pmime.split("/")[1]||"jpeg";
        if(pext==="jpeg")pext="jpg";
        var pbin=Uint8Array.from(atob(pdata),function(c2){return c2.charCodeAt(0);});
        zp.file("word/media/photo1."+pext,pbin);
        var rels2=await zp.file("word/_rels/document.xml.rels").async("string");
        rels2=rels2.replace("</Relationships>",'<Relationship Id="rIdP99" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/photo1.'+pext+'"/></Relationships>');
        zp.file("word/_rels/document.xml.rels",rels2);
        var ct2=await zp.file("[Content_Types].xml").async("string");
        if(ct2.indexOf('Extension="'+pext+'"')===-1){ct2=ct2.replace("</Types>",'<Default Extension="'+pext+'" ContentType="'+pmime+'"/></Types>');zp.file("[Content_Types].xml",ct2);}
        var phXml='<w:r><w:drawing><wp:anchor distT="0" distB="0" distL="0" distR="0" simplePos="0" relativeHeight="251660288" behindDoc="0" locked="0" layoutInCell="1" allowOverlap="1"><wp:simplePos x="0" y="0"/><wp:positionH relativeFrom="page"><wp:posOffset>5230000</wp:posOffset></wp:positionH><wp:positionV relativeFrom="page"><wp:posOffset>470000</wp:posOffset></wp:positionV><wp:extent cx="1080000" cy="1440000"/><wp:effectExtent l="0" t="0" r="0" b="0"/><wp:wrapNone/><wp:docPr id="99" name="Photo"/><wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="99" name="photo1"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="rIdP99" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="1080000" cy="1440000"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:anchor></w:drawing></w:r>';
        var bstart=xml.indexOf("<w:body>");var fp=xml.indexOf("</w:p>",bstart);if(fp!==-1){xml=xml.substring(0,fp)+phXml+xml.substring(fp);}
      }catch(pe){console.log("Photo error:",pe);}
    }
    xml=xml.replace(/w:val="dotted"/g,'w:val="nil"');
    zp.file("word/document.xml",xml);
    var blob=await zp.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="履歴書_"+(f.name||"output")+".docx";a.click();
    URL.revokeObjectURL(url);
    tt("ダウンロード完了！");
  }catch(err){console.error(err);tt("エラー: "+err.message);}
  setGenerating(false);
};

const S5=function(){
var eR=f.education.filter(function(e){return e.name;}).map(function(e){return {y:e.year,m:e.month,t:eduF(e)};});
var wR=f.work.filter(function(w){return w.company;}).map(function(w){return {y:w.year,m:w.month,t:w.company+" "+w.sfx};});
return <div className="space-y-4">
<div className="p-5 rounded-2xl border-0" style={{background:"linear-gradient(135deg,#EFF8E8,#F5FBF0)"}}>
<p className="text-sm font-bold mb-2">履歴書DOCXをダウンロード</p>
<p className="text-xs text-gray-600">入力データをWordテンプレートに書き込みます。そのまま提出・印刷OK。</p>
</div>
<div className="bg-white rounded-lg border p-4 space-y-1">
<p className="text-xs font-bold text-gray-500 border-b pb-1 mb-1">基本情報</p>
{f.name&&<p className="text-sm">氏名: {f.name}</p>}
{f.birthYear&&<p className="text-sm">生年月日: {f.birthYear}年{f.birthMonth}月{f.birthDay}日 {f.gender}</p>}
<p className="text-xs font-bold text-gray-500 border-b pb-1 mb-1 mt-2">住所</p>
{f.address&&<p className="text-sm">〒{f.zip} {f.address}</p>}
{f.mobile&&<p className="text-sm">携帯: {f.mobile}</p>}
{f.email&&<p className="text-sm">E-mail: {f.email}</p>}
<p className="text-xs font-bold text-gray-500 border-b pb-1 mb-1 mt-2">学歴・職歴</p>
{eR.map(function(e,i){return <p key={"e"+i} className="text-sm">{e.y}年{e.m}月 {e.t}</p>;})}
{wR.map(function(w,i){return <p key={"w"+i} className="text-sm">{w.y}年{w.m}月 {w.t}</p>;})}
{(dn(1)||dn(2)||dn(3)||dn(4))&&<div><p className="text-xs font-bold text-gray-500 border-b pb-1 mb-1 mt-2">障がい</p>
{dn(1)&&<p className="text-sm">①{dn(1)}</p>}{dn(2)&&<p className="text-sm">②{dn(2)}</p>}{dn(3)&&<p className="text-sm">③{dn(3)}</p>}{dn(4)&&<p className="text-sm">④{dn(4)}</p>}
<p className="text-xs font-bold text-gray-500 border-b pb-1 mb-1 mt-2">手帳</p>
{dg(1)&&<p className="text-sm">①{f.techo1} {dg(1)}</p>}{dg(2)&&<p className="text-sm">②{f.techo2} {dg(2)}</p>}{dg(3)&&<p className="text-sm">③{f.techo3} {dg(3)}</p>}
</div>}
{f.selfPR&&<div><p className="text-xs font-bold text-gray-500 border-b pb-1 mb-1 mt-2">自己PR</p><p className="text-sm whitespace-pre-wrap">{f.selfPR}</p></div>}
</div>
<div className="flex gap-2">
<button onClick={generateDocx} disabled={generating||!zipReady} className="text-white px-8 py-3.5 rounded-xl text-sm font-black shadow-lg disabled:opacity-40 transition-all" style={{background:"linear-gradient(135deg,#5B8C2B,#8CB82B)"}}>
{generating?"生成中...":"📄 履歴書DOCXをダウンロード"}
</button>
<button onClick={function(){setStep(0);}} className="bg-white text-gray-600 px-6 py-3 rounded-xl text-sm font-bold border-2 border-gray-200">編集に戻る</button>
</div>
</div>;
};

const steps=[S0,S1,S2,S3,S4,S5];

const SavePg=()=> <div className="space-y-4">
<button onClick={()=>setPg("form")} className="bg-white text-gray-600 px-6 py-3 rounded-xl text-sm font-bold border-2 border-gray-200">← 戻る</button>
<div className={cc}><h3 className={hc} style={{color:O[700]}}>保存スロット（3件）</h3>
{[0,1,2].map(i=> <div key={i} className="rounded-xl p-4 mb-3" style={{background:saves[i]?O[50]:"#F9FAFB",border:`1px solid ${saves[i]?O[300]:"#E5E7EB"}`}}>
<div className="flex justify-between items-center"><div><p className="text-sm font-bold" style={{color:saves[i]?O[800]:"#9CA3AF"}}>スロット{i+1}</p>{saves[i]?<p className="text-xs text-gray-500 mt-1">{saves[i]._at}　{saves[i].name||"未入力"}</p>:<p className="text-xs text-gray-400 mt-1">空き</p>}</div>
<div className="flex gap-2"><button onClick={()=>save(i)} className="px-4 py-2 rounded-xl text-xs font-bold text-white" style={{background:"#3B3228"}}>保存</button><button onClick={()=>load(i)} disabled={!saves[i]} className={`px-4 py-2 rounded-lg text-xs font-bold ${saves[i]?"bg-white border-2":"bg-gray-100 text-gray-300"}`} style={saves[i]?{borderColor:O[400],color:O[700]}:{}}>読込</button></div>
</div></div>)}
</div></div>;

return <div className="min-h-screen" style={{background:'#F5F0EB',fontFamily:"'Noto Sans JP',sans-serif"}}>
<div className="max-w-2xl mx-auto px-4 py-6 noprint">
<div className="text-center mb-8">
<img src="https://raw.githubusercontent.com/betectinc-create/resume-maker/main/logo.png" alt="CONNECT こねくと" style={{height:40,marginBottom:12}}/>
<h1 style={{fontSize:22,fontWeight:900,color:"#3B3228",letterSpacing:-0.5,marginBottom:4,fontFamily:"'Zen Maru Gothic',sans-serif"}}>障がい者雇用 履歴書メーカー</h1>
<p style={{fontSize:12,color:"#A0937D",fontWeight:500}}>選ぶだけで履歴書が完成。そのまま提出できます。</p>
</div>
<div className="rounded-xl p-3 mb-4 text-xs" style={{background:"#F0EDE8",border:"none",color:"#6B5D4F",borderRadius:16}}><b>個人情報は収集しません。</b>ブラウザ上のみで処理。</div>
{pg==="form"&&<>
<div className="flex gap-2 mb-6 overflow-x-auto pb-2">
{STP.map((s,i)=> <button key={i} onClick={()=>setStep(i)} className="whitespace-nowrap px-3 py-2 rounded-xl text-xs font-bold" style={{background:step===i?"#3B3228":"transparent",color:step===i?"#fff":"#8B7355",border:step===i?"none":"2px solid #E0D5C5",fontWeight:700}}>{i+1}.{s}</button>)}
<button onClick={()=>setPg("saves")} className="whitespace-nowrap px-3 py-2 rounded-xl text-xs font-bold ml-2" style={{background:"#EDE8E0",color:"#6B5D4F",border:"none"}}>保存/読込</button>
</div>
{steps[step]()}
<div className="flex justify-between mt-6 mb-4">
{step>0?<button onClick={()=>setStep(step-1)} className="bg-white text-gray-600 px-6 py-3 rounded-xl text-sm font-bold border-2 border-gray-200 hover:border-gray-300 transition-all">← 前へ</button>:<div/>}
{step<STP.length-1?<button onClick={()=>setStep(step+1)} className="text-white px-8 py-3 rounded-xl text-sm font-black shadow-lg hover:shadow-xl transition-all" style={{background:"linear-gradient(135deg,#D35C1F,#E87830)"}}>次へ →</button>:null}
</div></>}
{pg==="saves"&&<SavePg/>}
{toast&&<div className="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-sm font-bold text-white shadow-lg z-50" style={{background:"#3B3228",borderRadius:16}}>{toast}</div>}
<p className="text-center text-xs pb-8" style={{color:"#C0B5A5"}}>© CONNECT こねくと　|　個人情報はブラウザ上のみで処理されます</p>
</div></div>;}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
